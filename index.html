            const getActLabel = (index) => {
                if (index < 2) return "Act I: Who We Are & Who We Serve";
                if (index < 5) return "Act II: The Structural Crisis";
                if (index < 7) return "Act III: The Mismatch & The Hinge";
                if (index < 10) return "Act IV: Platform Architecture";
                if (index < 11) return "Act V: Theory of Change";
                if (index < 12) return "Act VI: Traction & Proof";
                return "Act VII: The Ask & Milestones";
            };

            const handlePrev = () => setCurrentSlide((prev) => (prev > 0 ? prev - 1 : prev));
            const handleNext = () => setCurrentSlide((prev) => (prev < slides.length - 1 ? prev + 1 : prev));

            return (
                <div className="min-h-screen bg-[#111827] flex flex-col items-center justify-center p-4 sm:p-8 font-sans">
                <div className="relative bg-white w-full max-w-[1280px] shadow-2xl rounded-sm overflow-hidden flex flex-col" style={{ aspectRatio: '16/9' }}>
                    <div className="h-1 w-full bg-[#EEEEEE] absolute top-0 left-0 z-50">
                    <div className="h-full bg-[#002AFF] transition-all duration-300 ease-in-out" style={{ width: `${((currentSlide + 1) / slides.length) * 100}%` }}></div>
                    </div>
                    <div className="flex-grow p-12 overflow-hidden relative">
                    {React.createElement(slides[currentSlide])}
                    <Logo />
                    </div>
                </div>
                <div className="mt-8 flex items-center justify-between w-full max-w-[1280px] px-4">
                    <div className="text-gray-400 text-sm font-medium flex items-center gap-2 tracking-wide">
                    <span className="text-white font-bold bg-gray-800 px-3 py-1 rounded">
                        {getActLabel(currentSlide)}
                    </span>
                    </div>
                    <div className="flex items-center gap-6">
                    <button onClick={handlePrev} disabled={currentSlide === 0} className="flex items-center gap-2 px-4 py-2 text-white bg-gray-800 rounded hover:bg-[#002AFF] disabled:opacity-30 disabled:hover:bg-gray-800 transition-colors">
                        <ChevronLeft size={20} />
                        <span className="text-sm font-semibold uppercase tracking-wider">Prev</span>
                    </button>
                    <div className="text-gray-400 font-mono text-sm font-medium px-4 py-1 bg-gray-900 rounded border border-gray-700">
                        {currentSlide + 1} / {slides.length}
                    </div>
                    <button onClick={handleNext} disabled={currentSlide === slides.length - 1} className="flex items-center gap-2 px-4 py-2 text-white bg-gray-800 rounded hover:bg-[#002AFF] disabled:opacity-30 disabled:hover:bg-gray-800 transition-colors">
                        <span className="text-sm font-semibold uppercase tracking-wider">Next</span>
                        <ChevronRight size={20} />
                    </button>
                    </div>
                    <div className="text-gray-500 text-sm flex gap-4">
                    <button className="hover:text-white transition-colors" title="Fullscreen"><Maximize size={18} /></button>
                    </div>
                </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
